# LEGACY — GitHub Pages deploy.
# Production hosting is now Cloudflare Pages (auto-deploys on push to main).
# This workflow is kept as a manual-trigger backup. To deploy to GitHub Pages
# again, go to Actions → "Deploy to GitHub Pages (manual backup)" → Run workflow.
#
# If you fully retire GitHub Pages, you can delete this file.

name: Deploy to GitHub Pages (manual backup)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build with Astro
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
