name: YouTube shorts sync

# Runs once a day at 09:00 UTC. Cloudflare Pages doesn't expose Cron Triggers
# for Pages Functions, so we drive the rotation from GitHub Actions: a tiny
# curl that pings the cron endpoint with the Bearer secret. Free, reliable,
# logged in the Actions tab.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   CRON_SECRET — same value as the CRON_SECRET env var in CF Pages settings.

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily
  workflow_dispatch: {}   # allows manual trigger from the Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/youtube-sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret not set — add it under Settings → Secrets."
            exit 1
          fi
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -w "\n__STATUS__%{http_code}" \
            https://troublebaba.com/api/cron/youtube-sync)
          status="${response##*__STATUS__}"
          body="${response%__STATUS__*}"
          echo "HTTP $status"
          echo "$body"
          [ "$status" = "200" ] || exit 1
